name: metagenomics-2023
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # ── Core Python ──────────────────────────────────────────────────────────
  - python=3.11.4
  - pip=23.2.1
  - pandas=2.0.3
  - numpy=1.25.2

  # ── Bioinformatics CLI tools ─────────────────────────────────────────────
  - fastqc=0.11.9
  - multiqc=1.15
  - trimmomatic=0.39
  - bowtie2=2.5.1
  - samtools=1.17
  - kraken2=2.1.3
  - bracken=2.8
  - megahit=1.2.9
  - metabat2=2.15
  - checkm2=1.0.1          # requires separate DB download
  - gtdbtk=2.3.2           # requires separate DB download
  - prokka=1.14.6
  - eggnog-mapper=2.1.11

  # ── R base + packages ────────────────────────────────────────────────────
  - r-base=4.3.1
  - r-tidyverse=2.0.0
  - r-vegan=2.6_4
  - r-ggplot2=3.4.3
  - r-ggrepel=0.9.3
  - r-ggpubr=0.6.0
  - r-rstatix=0.7.2
  - r-pheatmap=1.0.12
  - r-rcolorbrewer=1.1_3
  - r-patchwork=1.1.3
  - bioconductor-phyloseq=1.44.0
  - bioconductor-deseq2=1.40.2
  - bioconductor-complexheatmap=2.16.0

  # ── Pip-only packages ────────────────────────────────────────────────────
  - pip:
      - rmarkdown==2.24         # via reticulate / system R
